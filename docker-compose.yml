services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: analytics
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-please-set-jwt-access-secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      WORKSPACE_INVITE_EXPOSE_TOKEN: ${WORKSPACE_INVITE_EXPOSE_TOKEN:-false}
      WORKSPACE_INVITE_TTL_HOURS: ${WORKSPACE_INVITE_TTL_HOURS:-168}
      EVENT_IDEMPOTENCY_TTL_HOURS: ${EVENT_IDEMPOTENCY_TTL_HOURS:-72}
      EVENT_SCHEMA_ENFORCE: ${EVENT_SCHEMA_ENFORCE:-true}
      TRUST_PROXY: ${TRUST_PROXY:-}
      REDIS_URL: ${REDIS_URL:-}
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
